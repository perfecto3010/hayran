<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hayran | حيران 🤔</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d2ff">
    <style>
        :root { 
            --bg: #0f0f0f; 
            --card-bg: #1e1e1e;
            --accent-blue: #00d2ff;
            --accent-green: #4caf50;
            --accent-orange: #ff9800;
            --main-purple: #6441a5;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; background: var(--bg); 
            color: white; height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- شاشة الـ PIN (نفس سوا بالظبط) --- */
        #auth-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0f0f0f; z-index: 9999; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .pin-dots { display: flex; justify-content: center; gap: 15px; margin: 25px 0; direction: ltr; }
        .dot { width: 18px; height: 18px; border: 2px solid var(--main-purple); border-radius: 50%; }
        .dot.active { background-color: var(--main-purple); transform: scale(1.2); }
        .pin-keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 280px; direction: ltr; }
        .pin-keyboard button { 
            width: 70px; height: 70px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); color: white; font-size: 1.5rem; 
        }

        /* --- شاشات التطبيق --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; }
        
        .hub-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin: auto; width: 100%; max-width: 350px; }
        .hub-card { 
            background: var(--card-bg); padding: 30px; border-radius: 25px; 
            text-align: center; font-size: 1.4rem; font-weight: bold; cursor: pointer;
            border-right: 8px solid var(--accent-blue); transition: 0.3s;
        }

        .display-area { 
            flex-grow: 1; background: #1a1a1a; border-radius: 30px; 
            margin: 20px 0; display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; text-align: center; padding: 20px; border: 2px dashed #333;
        }

        .action-btn { 
            background: var(--accent-blue); color: black; padding: 20px; 
            border-radius: 20px; border: none; font-size: 1.2rem; font-weight: bold; 
        }

        /* --- قائمة المهام --- */
        .task-item { 
            background: #252525; padding: 15px; border-radius: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box;
        }
        .done { opacity: 0.4; text-decoration: line-through; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2>Hayran | حيران 🤔</h2>
        <div class="pin-dots" id="dots-container">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="pin-keyboard">
            <button onclick="press(1)">1</button><button onclick="press(2)">2</button><button onclick="press(3)">3</button>
            <button onclick="press(4)">4</button><button onclick="press(5)">5</button><button onclick="press(6)">6</button>
            <button onclick="press(7)">7</button><button onclick="press(8)">8</button><button onclick="press(9)">9</button>
            <button style="visibility:hidden"></button><button onclick="press(0)">0</button>
            <button onclick="del()" style="color:#ff4444">⌫</button>
        </div>
    </div>

    <div id="lobby" class="screen active">
        <h1 style="text-align:center; margin-top:30px;">حيران في إيه؟</h1>
        <div class="hub-grid">
            <div class="hub-card" style="border-color:var(--accent-orange)" onclick="go('geaan')">🍕 جعان</div>
            <div class="hub-card" style="border-color:var(--accent-blue)" onclick="go('arouh')">📍 أروح فين</div>
            <div class="hub-card" style="border-color:var(--accent-green)" onclick="go('tasks')">✅ مهامي</div>
        </div>
    </div>

    <div id="random-screen" class="screen">
        <button onclick="go('lobby')" style="background:none; border:none; color:white; text-align:right; font-size:1.2rem;">✕ رجوع</button>
        <div id="result-box" class="display-area">؟</div>
        <button id="spin-btn" class="action-btn" onclick="spin()">اختارلي 🎲</button>
    </div>

    <div id="tasks-screen" class="screen">
        <button onclick="go('lobby')" style="background:none; border:none; color:white; text-align:right; font-size:1.2rem; margin-bottom:10px;">✕ رجوع</button>
        <div id="task-list" style="overflow-y:auto; flex-grow:1;"></div>
        <p style="text-align:center; font-size:0.7rem; opacity:0.5;">يتم التحديث عبر GitHub</p>
    </div>

<script src="gamesData.js"></script>

    <script>
        let currentPin = "";
        const correctPin = "3042023";

        // وظيفة التأكد من الـ PIN والدخول
        function press(n) {
            if(currentPin.length < 7) {
                currentPin += n;
                updateDots();
                if(currentPin.length === 7) {
                    if(currentPin === correctPin) {
                        document.getElementById('auth-overlay').style.display = 'none';
                        document.getElementById('lobby').classList.add('active'); // إظهار اللوبي
                        sessionStorage.setItem('h_auth', '1');
                    } else {
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                        alert("الرمز خطأ"); 
                        currentPin = ""; 
                        updateDots();
                    }
                }
            }
        }

        function del() { currentPin = currentPin.slice(0,-1); updateDots(); }
        
        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => d.classList.toggle('active', i < currentPin.length));
        }

        let currentMode = "";
        function go(screenId) {
            // إخفاء كل الشاشات
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            
            if(screenId === 'geaan' || screenId === 'arouh') {
                currentMode = screenId;
                document.getElementById('random-screen').classList.add('active');
                document.getElementById('result-box').innerText = "؟";
                document.getElementById('spin-btn').style.background = screenId === 'geaan' ? 'var(--accent-orange)' : 'var(--accent-blue)';
            } else {
                // التعامل مع شاشة المهام أو اللوبي
                const target = document.getElementById(screenId + '-screen') || document.getElementById(screenId);
                if(target) {
                    target.classList.add('active');
                    if(screenId === 'tasks') loadTasks();
                }
            }
        }

        function spin() {
            if (!data[currentMode]) return;
            const options = data[currentMode];
            const res = document.getElementById('result-box');
            res.style.opacity = "0.5";
            res.innerText = "جاري الاختيار...";
            
            setTimeout(() => {
                res.style.opacity = "1";
                const randomChoice = options[Math.floor(Math.random() * options.length)];
                res.innerText = randomChoice;
                if (navigator.vibrate) navigator.vibrate(50);
            }, 600);
        }

        function loadTasks() {
            const taskList = document.getElementById('task-list');
            if(!data.tasks) return;
            
            taskList.innerHTML = data.tasks.map(t => `
                <div class="task-item ${t.d ? 'done' : ''}">
                    <span>${t.t}</span>
                    <span>${t.d ? '✅' : '⏳'}</span>
                </div>
            `).join('');
        }

        // عند التحميل: لو مسجل دخول افتح اللوبي فوراً
        window.onload = () => { 
            if(sessionStorage.getItem('h_auth') === '1') {
                document.getElementById('auth-overlay').style.display='none';
                document.getElementById('lobby').classList.add('active');
            }
        };
    </script>
</body>
</html>
